$kind: http-request
name: List latest transactions
method: GET
url: '{{baseUrl}}/transactions?limit=15'
order: 1000
queryParams:
  - key: limit
    value: '15'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('response time is below 2000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test('body is valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });
      pm.test('body has pagination envelope', function () {
        var json = pm.response.json();
        pm.expect(json.transactions).to.be.an('array');
        pm.expect(json.total).to.be.a('number');
        pm.expect(json.limit).to.be.a('number');
        pm.expect(json.offset).to.be.a('number');
      });
      pm.test('first tx shape and BigInt-as-string', function () {
        var arr = pm.response.json().transactions;
        if (arr.length > 0) {
          var t = arr[0];
          pm.expect(t.hash).to.be.a('string');
          pm.expect(t.blockNumber).to.be.a('string');
          pm.expect(t.value).to.be.a('string');
        }
      });
      pm.test('capture txHash and address for chaining', function () {
        var arr = pm.response.json().transactions;
        if (Array.isArray(arr) && arr.length > 0) {
          if (arr[0].hash) pm.environment.set('txHash', arr[0].hash);
          if (arr[0].fromAddress) pm.environment.set('address', arr[0].fromAddress);
        }
      });
      pm.test('first tx has method label', function () {
        var arr = pm.response.json().transactions;
        if (arr.length > 0) {
          pm.expect(arr[0].method, 'method').to.be.a('string');
          pm.expect(arr[0].method.length, 'method not empty').to.be.above(0);
        }
      });
