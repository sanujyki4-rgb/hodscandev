$kind: collection
name: hoodscan API
description: REST API for the hoodscan block explorer.
variables:
  - key: baseUrl
    value: 'http://localhost:4000'
  - key: address
    value: '0xc341aa48fc52c35420cb5705042c1ae9a9db213f'
  - key: blockNumber
    value: ''
  - key: txHash
    value: ''
  - key: tokenAddress
    value: ''
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Self-seed valid parameters from the live list endpoints so that the
      // 'detail' requests always have real IDs, regardless of environment.
      const base = pm.variables.get('baseUrl') || 'http://localhost:4000';
      const seeds = [
        { flag: 'blockNumber', path: '/blocks?limit=1', pick: function (j) { var r = (j.blocks || j)[0]; return r && String(r.number); } },
        { flag: 'txHash', path: '/transactions?limit=1', pick: function (j) { var r = (j.transactions || j)[0]; return r && r.hash; } },
        { flag: 'tokenAddress', path: '/tokens?limit=1', pick: function (j) { var r = (j.tokens || j)[0]; return r && r.address; } }
      ];
      seeds.forEach(function (s) {
        if (pm.collectionVariables.get(s.flag)) { return; }
        pm.sendRequest(base + s.path, function (err, res) {
          if (err || !res || res.code !== 200) { return; }
          try { var val = s.pick(res.json()); if (val) { pm.collectionVariables.set(s.flag, val); } } catch (e) {}
        });
      });
