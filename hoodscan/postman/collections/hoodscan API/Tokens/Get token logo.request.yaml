$kind: http-request
name: Get token logo
method: GET
url: '{{baseUrl}}/tokens/{{tokenAddress}}/logo'
order: 7000
description: |-
  Binary token logo image (proxied). Responds with an image/png body (200) when a logo is available, or 404 when the token has no logo. This endpoint does not return JSON.
examples: './.resources/Get token logo.resources/examples'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200 or 404', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });
      pm.test('response time is below 2000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test('logo is an image when present', function () {
        if (pm.response.code === 200) {
          pm.expect(pm.response.headers.get('Content-Type') || '').to.include('image');
        }
      });
