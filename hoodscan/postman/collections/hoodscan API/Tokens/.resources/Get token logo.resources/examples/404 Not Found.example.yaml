$kind: http-example
name: '404 Not Found'
request:
  url: '{{baseUrl}}/tokens/{{tokenAddress}}/logo'
  method: GET
response:
  statusCode: 404
  statusText: 'Not Found'
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "error": "Not found"
      }
order: 1000
