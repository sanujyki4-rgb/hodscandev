$kind: http-request
name: List token holdings by address
method: GET
url: '{{baseUrl}}/address/{{address}}/token-holdings?limit=20&offset=0'
order: 2500
queryParams:
  - key: limit
    value: '20'
  - key: offset
    value: '0'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('response time is below 2000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test('body is valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });
      pm.test('has holdings array + pagination envelope', function () {
        const body = pm.response.json();
        pm.expect(body).to.have.property('holdings');
        pm.expect(body.holdings).to.be.an('array');
        pm.expect(body).to.have.property('total');
      });
