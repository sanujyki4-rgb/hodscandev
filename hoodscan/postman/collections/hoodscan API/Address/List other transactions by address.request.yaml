$kind: http-request
name: List other transactions by address
method: GET
url: '{{baseUrl}}/address/{{address}}/other-transactions?limit=20&offset=0'
order: 10000
description: |-
  Other transactions (e.g. contract creations and non-standard txs) involving the address. Returns the address header + pagination envelope + a transactions[] array. Each transaction includes hash, blockNumber (string), fromAddress, toAddress (nullable), string value, and a resolved method label.
examples: './.resources/List other transactions by address.resources/examples'
queryParams:
  - key: limit
    value: '20'
  - key: offset
    value: '0'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('response time is below 2000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test('body is valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });
      pm.test('address + pagination envelope', function () {
        var json = pm.response.json();
        pm.expect(json.address, 'address').to.be.a('string');
        pm.expect(json.total, 'total').to.be.a('number');
        pm.expect(json.limit, 'limit').to.be.a('number');
        pm.expect(json.offset, 'offset').to.be.a('number');
        pm.expect(json.transactions, 'transactions').to.be.an('array');
      });
      pm.test('transaction items are well-formed', function () {
        var arr = pm.response.json().transactions;
        if (Array.isArray(arr) && arr.length > 0) {
          pm.expect(arr[0].hash, 'hash').to.be.a('string');
          pm.expect(arr[0].fromAddress, 'fromAddress').to.be.a('string');
        }
      });
