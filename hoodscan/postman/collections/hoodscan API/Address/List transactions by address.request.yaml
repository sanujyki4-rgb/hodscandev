$kind: http-request
name: List transactions by address
method: GET
url: '{{baseUrl}}/address/{{address}}/transactions?limit=20&offset=0'
order: 1000
queryParams:
  - key: limit
    value: '20'
  - key: offset
    value: '0'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('response time is below 2000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test('body is valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });
      pm.test('body has address envelope', function () {
        var json = pm.response.json();
        pm.expect(json.address).to.be.a('string');
        pm.expect(json.transactions).to.be.an('array');
        pm.expect(json.total).to.be.a('number');
        pm.expect(json.limit).to.be.a('number');
        pm.expect(json.offset).to.be.a('number');
      });
      pm.test('transactions have method label', function () {
        var arr = pm.response.json().transactions;
        if (Array.isArray(arr) && arr.length > 0) {
          pm.expect(arr[0].method, 'method').to.be.a('string');
          pm.expect(arr[0].method.length, 'method not empty').to.be.above(0);
        }
      });
