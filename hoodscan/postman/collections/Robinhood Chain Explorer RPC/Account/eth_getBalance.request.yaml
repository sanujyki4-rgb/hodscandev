$kind: http-request
name: eth_getBalance
method: POST
url: '{{baseUrl}}'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: X-API-KEY
    value: '{{apiKey}}'
body:
  type: json
  content: |-
    {"jsonrpc":"2.0","id":1,"method":"eth_getBalance","params":["{{address}}","latest"]}
