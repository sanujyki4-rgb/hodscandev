$kind: http-request
name: debug_traceBlockByHash
method: POST
url: '{{baseUrl}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: X-API-KEY
    value: '{{apiKey}}'
body:
  type: json
  content: |-
    {"jsonrpc":"2.0","id":1,"method":"debug_traceBlockByHash","params":["{{blockHash}}",{"tracer":"callTracer"}]}
