$kind: collection
name: Robinhood Chain Explorer RPC
description: |-
  JSON-RPC explorer collection for the Robinhood Chain (chainId 4663, Arbitrum Nitro).

  ## Switching RPC providers
  To switch the RPC provider, change the {{baseUrl}} collection variable. Provider options:

  - **ZAN**: https://api.zan.top/node/v1/robinhood/mainnet/2f572f8319004705b683221368b31aaf
  - **Alchemy**: https://robinhood-mainnet.g.alchemy.com/v2/rKurn3FHWRh_tnG3hlyj5
  - **QuickNode**: https://little-icy-yard.robinhood-mainnet.quiknode.pro/1aa979eaf2eff5713b2a0712ad459ba296b9598b/
  - **Uniblock (default, needs X-API-KEY)**: https://api.uniblock.dev/uni/v1/json-rpc?chainId=4663

  The `X-API-KEY` header is only used by Uniblock; other providers ignore it harmlessly.
