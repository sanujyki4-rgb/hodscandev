$kind: http-request
name: eth_getFilterChanges
method: POST
url: '{{baseUrl}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: X-API-KEY
    value: '{{apiKey}}'
body:
  type: json
  content: |-
    {"jsonrpc":"2.0","id":1,"method":"eth_getFilterChanges","params":["{{filterId}}"]}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('response time is below 5000ms', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });
      pm.test('body is valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });
      pm.test('JSON-RPC 2.0 response without error', function () {
        var json = pm.response.json();
        pm.expect(json.jsonrpc, 'jsonrpc field').to.eql('2.0');
        pm.expect(json, 'unexpected RPC error: ' + JSON.stringify(json && json.error)).to.not.have.property('error');
        pm.expect(json, 'missing result').to.have.property('result');
      });
